          <script> 
            function calsculsall(){   var now = new Date();

                var canvas = document.getElementById('canvas'); 
                var c = canvas.getContext('2d');
                c.fillStyle = 'white';
                c.fillRect(0, 0, 600, 300)  // x, y, 너비, 높이
                c.fillStyle = 'black';
                c.font = 'bold 20px dotum';
                c.fillText('영수증', 30, 20);
                c.font = 'bold 12px dotum';
                c.fillText(`${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}  ${now.getHours()}:${now.getMinutes()}:${now.getSeconds() }`, 30, 50);
                document.querySelectorAll('.ibboxs .card').forEach(function(el,i){
                    title = el.querySelector('h5').innerText;
                    company = el.querySelectorAll('p')[0].innerText;
                    prices = Number(el.querySelectorAll('p')[1].innerText.split(': ')[1]);
                    gasu = el.querySelector('input').value;
                    allprice = gasu*prices
                    perx = 130;
                    stx = 50;
                    sty = 80;
                    c.fillText(title,stx+(perx*i),sty)
                    c.fillText(company,stx+(perx*i),sty+30)
                    c.fillText('가격 :'+prices,stx+(perx*i),sty+60)
                    c.fillText('수량 :'+gasu,stx+(perx*i),sty+90)
                    c.fillText('합계 :'+allprice,stx+(perx*i),sty+120)
                    if (i==document.querySelectorAll('.ibboxs .card').length-1){
                        last = document.querySelector('.cals p').innerText.split(': ')[1]
                        c.fillText('총 합계 :'+last,stx,sty+180)
                        
                    }
                })
            }
            
          </script> 
          <script> 
          
          function claculates(){
                dap = 0;
                document.querySelectorAll('.ibboxs .card').forEach(function(el){
                    var a = el.querySelector('input').value;
                    var b = Number(el.querySelectorAll('p')[1].innerText.split(': ')[1])
                    dap = dap + (a*b);
                })
                document.querySelector('.cals p').innerHTML = '가격 : '+ dap; 
            }
            async function init() {
                let res = await fetch('./images/store.json')
                let data = await res.json();
                let titlearray = []
                array = data.products;
                array.forEach(function(el,i){
                    console.log(el)
                    let sameyoso = `<div class="card"><img src="images/pr${i+1}.JPG" class="card-img-top" alt="..."><div class="card-body"><h5 class="card-title">${el.title}</h5><p class="card-text">${el.brand}</p><p class="card-text">가격 : ${el.price}</p><a href="#" class="btn btn-primary">담기</a></div></div>`
                    titlearray.push(el.title)
                    document.querySelector('.mainview').insertAdjacentHTML('beforeend',sameyoso);
                        })    
                for (let i = 0; i<document.querySelectorAll('.card').length; i++){
                    document.querySelectorAll('.card')[i].style.gridColumn = `${i+1}/${i+2}`;  // 1열씩만 차지
                    document.querySelectorAll('.card')[i].style.gridRow = '2/3';     // 2행 차지
                }
                let a = []
                document.querySelector('input').addEventListener('input', function(e){
                        var inputdata = e.target.value; 
                        var compares = titlearray.findIndex(function(el){return el.includes(inputdata)})
                        if (compares!=-1 && inputdata!=''){
                            document.querySelectorAll('.mainview .card').forEach(function(el,i){
                                a.push(el)
                                el.remove();
                            })
                            a[compares].style.gridColumn = '1/2';
                            document.querySelector('.mainview').appendChild(a[compares]);
                        }
                        else if (inputdata==''){
                            a.forEach(function(els,i){
                                document.querySelector('.mainview').appendChild(a[i]);
                            })
                        }
                    })
                    var nowdrag;
                document.querySelectorAll('.mainview').forEach(function(card){
                    card.addEventListener('dragstart',function(e){
                        nowdrag = e.target.parentElement;
                    })
                })
                document.querySelector('.ibboxs').addEventListener('dragover',function(e){
                    e.preventDefault()
                })
                document.querySelector('.ibboxs').addEventListener('drop', function(e){
                    e.preventDefault()
                    var copys = nowdrag.cloneNode(true)
                    var copytest = false;
                    console.log(copys)
                    copys.querySelector('a').remove();
                    copys.querySelector('.card-body').insertAdjacentHTML('beforeend','<input type="number" value ="1">')
                    document.querySelector('.ibboxs').querySelectorAll('.card').forEach(function(el){
                            if (el.querySelector('img').src==copys.querySelector('img').src){
                                console.log('같을때에요',el)
                                var a = el.querySelector('input').value;
                                a = Number(a)+1; 
                                el.querySelector('input').value = a;
                                console.log('같을때vlaue',el.querySelector('input').value)
                                copytest = true;
                                claculates()
                            }
                        }) 
                        if (copytest==false){
                        document.querySelector('.ibboxs').appendChild(copys)  
                        claculates()
                    } 
                })
                document.querySelector('.mainview').addEventListener('click',function(e){
                    if (e.target.tagName == 'A'){
                        e.preventDefault()
                        var copystemp = e.target.parentElement.parentElement.cloneNode(true);
                        var copytest = false ; 
                        copystemp.querySelector('a').remove();
                        copystemp.querySelector('.card-body').insertAdjacentHTML('beforeend','<input type="number" value ="1">')
                        document.querySelector('.ibboxs').querySelectorAll('.card').forEach(function(el){
                            if (el.querySelector('img').src==copystemp.querySelector('img').src){
                                // console.log('같을때에요',el)
                                var a = el.querySelector('input').value;
                                a = Number(a)+1; 
                                el.querySelector('input').value = a;
                                // console.log('같을때vlaue',el.querySelector('input').value)
                                copytest = true;
                                claculates()
                            }
                        }) 
                        if (copytest==false){
                        document.querySelector('.ibboxs').appendChild(copystemp)  
                        claculates()
                    }
                    }
                })
              
            }
            init();
            document.querySelector('.cals button').addEventListener('click',function(e){
                document.getElementsByClassName('black-bg')[0].classList.toggle('show');
            });
            document.querySelectorAll('.btn')[1].addEventListener('click',function(e){
                document.getElementsByClassName('black-bg')[0].classList.toggle('show');
            });
            document.querySelectorAll('.btn')[0].addEventListener('click',function(e){
                document.getElementsByClassName('black-bg')[0].classList.toggle('show');
                document.querySelector('.canvas12').classList.toggle('shows');
                calsculsall();
            });
            document.querySelector('.canvas12 button').addEventListener('click',function(e){
                document.querySelector('.canvas12').classList.toggle('shows');
            })
